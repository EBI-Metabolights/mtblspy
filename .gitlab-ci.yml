stages:
  - submission

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  REPORTS_DIR: "$CI_PROJECT_DIR/submission/reports"
  RUN_LOCAL_VALIDATION: "true"
  RUN_REMOTE_VALIDATION: "true"
  CLEAN_FTP_TEMP_FILES: "false"
  OPA_DOWNLOAD_URL: "https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static"

submission_initial_flow:
  stage: submission
  image: python:3.12-slim
  rules:
    - if: '$RUN_MTBLS_SUBMISSION_PIPELINE == "true"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never
  before_script:
    - python -m pip install --upgrade pip
    - pip install .
    - |
      if [ "${RUN_LOCAL_VALIDATION:-true}" = "true" ] && ! command -v opa >/dev/null 2>&1; then
        apt-get update
        apt-get install -y --no-install-recommends curl ca-certificates
        curl -L -o /usr/local/bin/opa "$OPA_DOWNLOAD_URL"
        chmod 755 /usr/local/bin/opa
      fi
  script:
    - mkdir -p submission/reports
    - touch submission/reports/submission.env
    - python scripts/run_submission_pipeline.py
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - submission/reports/
    reports:
      dotenv: submission/reports/submission.env
  cache:
    key: "$CI_COMMIT_REF_SLUG-pip"
    paths:
      - .cache/pip/
